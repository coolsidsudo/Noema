services:
  noema-human-projection:
    image: nginx:1.27-alpine
    container_name: noema-human-projection
    ports:
      - "${NOEMA_HUMAN_PORT:-8080}:80"
    volumes:
      - ${NOEMA_REPO_ROOT:?set in reference.env}:/usr/share/nginx/html/noema:ro
    restart: unless-stopped

  noema-agent-surface:
    image: python:3.12-alpine
    container_name: noema-agent-surface
    working_dir: /surface
    command: ["python", "/surface/agent_surface/server.py"]
    environment:
      - NOEMA_AGENT_PORT=8787
      - NOEMA_MACHINE_REPO_ROOT=/repo
      - NOEMA_AGENT_CONTRACT_PATH=/surface/contracts/agent-surface-baseline.json
    ports:
      - "${NOEMA_AGENT_PORT:-8787}:8787"
    volumes:
      - ${NOEMA_REPO_ROOT:?set in reference.env}:/repo:ro
      - ./agent_surface:/surface/agent_surface:ro
      - ./contracts:/surface/contracts:ro
    restart: unless-stopped

  noema-maintainer:
    image: python:3.12-slim
    container_name: noema-maintainer
    working_dir: /opt/noema
    command: ["sleep", "infinity"]
    volumes:
      - ${NOEMA_REPO_ROOT:?set in reference.env}:/opt/noema
      - ${NOEMA_STATE_ROOT:?set in reference.env}:/var/lib/noema
    restart: unless-stopped
